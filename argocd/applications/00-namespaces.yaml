apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  project: observability
  source:
    repoURL: https://git.example.invalid/observability-standard.git
    targetRevision: main
    path: policies
    directory:
      include: pod-security-namespace.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
