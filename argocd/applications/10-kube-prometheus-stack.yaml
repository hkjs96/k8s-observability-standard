apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: observability
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 85.0.2
      helm:
        releaseName: kube-prometheus-stack
        valueFiles:
          - $values/values/common/kube-prometheus-stack.yaml
          - $values/values/profiles/basic.yaml
          - $values/values/env/dev.yaml
          - $values/values/sizing/small.yaml
    - repoURL: https://git.example.invalid/observability-standard.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
