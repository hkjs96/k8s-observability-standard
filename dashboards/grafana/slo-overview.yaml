apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-slo-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Observability Profiles
data:
  slo-overview.json: |
    {
      "title": "SLO Overview",
      "uid": "slo-overview",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Example Availability",
          "gridPos": { "x": 0, "y": 0, "w": 8, "h": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 3,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 0.99 },
                  { "color": "green", "value": 0.999 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "slo:example_service_availability:ratio_rate5m",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Request Rate",
          "gridPos": { "x": 8, "y": 0, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{slo_service=\"example-service\"}[5m])) by (code)",
              "legendFormat": "{{code}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Error Budget Burn",
          "gridPos": { "x": 16, "y": 0, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "(1 - slo:example_service_availability:ratio_rate5m) / (1 - 0.999)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Availability Ratio",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "slo:example_service_availability:ratio_rate5m",
              "refId": "A"
            }
          ]
        }
      ]
    }
