apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-notifiers-observability-profiles
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  contact-points.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: smoke-contact-point
        receivers:
          - uid: smoke-webhook
            type: webhook
            settings:
              url: https://alerts.example.invalid/grafana
    policies:
      - orgId: 1
        receiver: smoke-contact-point
        group_by:
          - grafana_folder
          - alertname
