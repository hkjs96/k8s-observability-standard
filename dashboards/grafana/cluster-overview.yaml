apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Kubernetes
data:
  cluster-overview.json: |
    {
      "title": "Cluster Overview",
      "uid": "cluster-overview",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "CPU Usage by Namespace",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 4 },
          "targets": [
            {
              "expr": "namespace:container_cpu_usage_seconds_total:sum_rate5m",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Memory Usage by Namespace",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 4 },
          "targets": [
            {
              "expr": "namespace:container_memory_working_set_bytes:sum",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Node CPU Utilisation",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "node:node_cpu_utilisation:ratio_rate5m",
              "legendFormat": "{{node}}"
            }
          ]
        }
      ]
    }
