apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-observability-profiles
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  observability-profiles.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-gateway.observability-logs.svc.cluster.local
        isDefault: false
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.observability-traces.svc.cluster.local:3200
        isDefault: false
        jsonData:
          serviceMap:
            datasourceUid: prometheus
          tracesToLogsV2:
            datasourceUid: loki
            tags:
              - namespace
              - app
              - container
            filterByTraceID: false
            filterBySpanID: false
