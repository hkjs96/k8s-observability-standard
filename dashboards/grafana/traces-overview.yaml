apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-traces-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Observability Profiles
data:
  traces-overview.json: |
    {
      "title": "Traces Overview",
      "uid": "traces-overview",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Tempo Targets Up",
          "gridPos": { "x": 0, "y": 0, "w": 8, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(up{namespace=\"observability-traces\"})",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Tempo Request Rate",
          "gridPos": { "x": 8, "y": 0, "w": 16, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tempo_request_duration_seconds_count[5m])) by (route)",
              "legendFormat": "{{route}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Received Spans",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tempo_distributor_spans_received_total[5m]))",
              "refId": "A"
            }
          ]
        }
      ]
    }
