apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-traced-loadgen
  namespace: observability-smoke
  labels:
    app.kubernetes.io/name: example-traced-loadgen
    app.kubernetes.io/component: smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: example-traced-loadgen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example-traced-loadgen
        app.kubernetes.io/component: smoke
    spec:
      containers:
        - name: loadgen
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                wget -qO- http://example-traced-frontend:8080/ || true
                sleep 5
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
