apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-log-generator
  namespace: observability-smoke
  labels:
    app.kubernetes.io/name: example-log-generator
    app.kubernetes.io/component: smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: example-log-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example-log-generator
        app.kubernetes.io/component: smoke
    spec:
      containers:
        - name: log-generator
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                echo "phase3 smoke info iteration=$i service=example-log-generator"
                if [ $((i % 5)) -eq 0 ]; then
                  echo "phase3 smoke error iteration=$i service=example-log-generator"
                fi
                i=$((i + 1))
                sleep 10
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
