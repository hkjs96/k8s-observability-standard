apiVersion: v1
kind: ConfigMap
metadata:
  name: example-slo-metrics-generator
  namespace: observability-smoke
  labels:
    app.kubernetes.io/name: example-slo-metrics-generator
    app.kubernetes.io/component: smoke
data:
  server.py: |
    import http.server
    import itertools
    import time

    started = time.time()
    requests = itertools.count(1)

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            current = next(requests)
            if self.path == "/metrics":
                ok = current * 97
                errors = current * 3
                body = "\n".join([
                    "# HELP http_requests_total Fictional smoke HTTP requests.",
                    "# TYPE http_requests_total counter",
                    f"http_requests_total{{slo_service=\"example-service\",code=\"200\"}} {ok}",
                    f"http_requests_total{{slo_service=\"example-service\",code=\"500\"}} {errors}",
                    "# HELP example_service_uptime_seconds Fictional smoke service uptime.",
                    "# TYPE example_service_uptime_seconds gauge",
                    f"example_service_uptime_seconds {int(time.time() - started)}",
                    "",
                ])
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4")
                self.end_headers()
                self.wfile.write(body.encode("utf-8"))
                return
            self.send_response(200)
            self.end_headers()
            self.wfile.write(b"ok\n")

        def log_message(self, format, *args):
            return

    http.server.ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-slo-metrics-generator
  namespace: observability-smoke
  labels:
    app.kubernetes.io/name: example-slo-metrics-generator
    app.kubernetes.io/component: smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: example-slo-metrics-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example-slo-metrics-generator
        app.kubernetes.io/component: smoke
    spec:
      containers:
        - name: metrics-generator
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/server.py
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          ports:
            - name: http-metrics
              containerPort: 8080
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: app
          configMap:
            name: example-slo-metrics-generator
---
apiVersion: v1
kind: Service
metadata:
  name: example-slo-metrics-generator
  namespace: observability-smoke
  labels:
    app.kubernetes.io/name: example-slo-metrics-generator
    app.kubernetes.io/component: smoke
spec:
  selector:
    app.kubernetes.io/name: example-slo-metrics-generator
  ports:
    - name: http-metrics
      port: 8080
      targetPort: http-metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: example-slo-metrics-generator
  namespace: observability-smoke
  labels:
    app.kubernetes.io/name: example-slo-metrics-generator
    app.kubernetes.io/component: smoke
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: example-slo-metrics-generator
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s
