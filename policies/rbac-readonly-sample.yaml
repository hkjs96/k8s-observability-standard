apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: observability-read-only
  namespace: monitoring
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - services
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - prometheusrules
      - servicemonitors
      - podmonitors
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: observability-read-only
  namespace: monitoring
subjects:
  - kind: Group
    name: observability-readers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: observability-read-only
  apiGroup: rbac.authorization.k8s.io
