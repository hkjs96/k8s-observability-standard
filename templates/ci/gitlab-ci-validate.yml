stages:
  - validate

validate-observability-standard:
  stage: validate
  image: golang:1.22
  before_script:
    - apt-get update
    - apt-get install -y curl unzip python3 python3-pip
    - sh scripts/install-validation-tools.sh
  script:
    - go run ./cmd/obsctl validate --strict-tools
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
