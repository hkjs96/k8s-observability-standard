name: Validate Observability Standard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Set up Python for YAML parser
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Validate
        shell: pwsh
        run: go run ./cmd/obsctl validate
