name: Validate Observability Standard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Set up Python for YAML parser
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python YAML parser
        shell: pwsh
        run: python -m pip install PyYAML

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install promtool
        shell: pwsh
        run: |
          $version = "3.4.0"
          $tools = ".tmp/tools"
          New-Item -ItemType Directory -Force -Path $tools | Out-Null
          $zip = Join-Path $tools "prometheus.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/prometheus/prometheus/releases/download/v$version/prometheus-$version.windows-amd64.zip" `
            -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $tools -Force

      - name: Validate
        shell: pwsh
        run: go run ./cmd/obsctl validate --strict-tools
