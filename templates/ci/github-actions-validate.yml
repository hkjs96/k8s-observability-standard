name: Validate Observability Standard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Set up Python for YAML parser
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install validation tools
        run: |
          python -m pip install PyYAML
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o /tmp/kubeconform.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          curl -fsSL https://github.com/prometheus/prometheus/releases/download/v3.4.0/prometheus-3.4.0.linux-amd64.tar.gz -o /tmp/prometheus.tar.gz
          tar -xzf /tmp/prometheus.tar.gz -C /tmp
          mv /tmp/prometheus-3.4.0.linux-amd64/promtool /usr/local/bin/promtool

      - name: Validate
        run: go run ./cmd/obsctl validate --strict-tools
